<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SQL Assistant | CSE Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="mb-12 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-emerald-400 mb-2">AI SQL ASSISTANT</h1>
            <p class="text-slate-400 uppercase tracking-widest text-sm">C:\Users\ADMIN\Documents\AI - lab</p>
        </div>

        <div class="glass rounded-3xl p-6 md:p-8 mb-8 glow">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="queryInput" placeholder="Try: 'details of students starting with S above half score'..." 
                       class="flex-1 bg-slate-900/50 border border-slate-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-sky-500 transition-all">
                <button onclick="handleQuery()" class="bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold px-10 py-4 rounded-2xl transition-all active:scale-95">
                    RUN COMMAND
                </button>
            </div>
            <div id="sqlDebug" class="mt-4 text-xs font-mono text-sky-400/60 hidden"></div>
        </div>

        <div id="resultsWrapper" class="glass rounded-3xl overflow-hidden hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-sky-400 uppercase text-xs">
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-300 divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function handleQuery() {
            const query = document.getElementById('queryInput').value;
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            const data = await res.json();
            
            // Show SQL Debug
            const debug = document.getElementById('sqlDebug');
            debug.innerText = `SQL: ${data.sql}`;
            debug.classList.remove('hidden');

            const wrapper = document.getElementById('resultsWrapper');
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            if (data.data && data.data.length > 0) {
                wrapper.classList.remove('hidden');
                // Build Header
                header.innerHTML = Object.keys(data.data[0]).map(k => `<th class="px-6 py-4">${k}</th>`).join('');
                // Build Body
                body.innerHTML = data.data.map(row => `
                    <tr class="hover:bg-white/5 transition-colors">
                        ${Object.values(row).map(v => `<td class="px-6 py-4">${v}</td>`).join('')}
                    </tr>
                `).join('');
            } else {
                wrapper.classList.add('hidden');
                alert("No matching records found.");
            }
        }
    </script>
</body>
</html>
